dedup:
  cooldown_minutes: 0
  enabled: true
fund_flow:
  alert_threshold: 30000000
  enabled: true
monitor:
  interval_seconds: 30
  lookback_days: 60
notifier:
  qmsg_key: ''
  serverchan_key: ''
  type: wecom
  wecom_webhook: ''
price_alerts: null
dip_add:
  add_count: 3       # 每只股最多加仓次数
  enabled: true
  max_drop: 8.0      # 最大跌幅%
  min_drop: 3.0      # 最小跌幅%
  ratio_heavy: 0.10  # 重仓比例（跌7-8%）
  ratio_light: 0.05  # 轻仓比例（跌3-5%）
  ratio_medium: 0.08 # 中仓比例（跌5-7%）
real_trader:
  credentials_file: credentials.json
  dry_run: true
  enabled: false
  headless: false
  max_daily_trades: 10
signals:
  bollinger:
    enabled: true
    period: 20
    std_dev: 2.0
  ma_crossover:
    enabled: true
    ma_long: 20
    ma_short: 5
  macd:
    enabled: true
    fast: 12
    signal: 9
    slow: 26
  rsi:
    enabled: true
    overbought: 70
    oversold: 30
    period: 14
  volume_breakout:
    enabled: true
    ma_period: 5
    ratio: 1.5
  breakout:
    enabled: true
    lookback: 20
    min_vol_ratio: 1.2
    min_confidence: 60
  dragon_back:
    enabled: true
    lookback_days: 15
    min_confidence: 60
