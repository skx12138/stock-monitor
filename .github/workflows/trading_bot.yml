name: A股量化监控

'on':
  schedule:
    - cron: '20 1 * * 1-5'
  workflow_dispatch:

jobs:
  trading-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: stock-monitor/requirements.txt

      - name: 安装依赖
        run: |
          cd stock-monitor
          pip install -r requirements.txt

      - name: 运行监控机器人
        run: |
          cd stock-monitor
          python run.py
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          TZ: 'Asia/Shanghai'

      - name: 保存交易数据
        run: |
          cd stock-monitor
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add papertrade_data.json -f
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "auto: update trading data $(date +'%Y-%m-%d %H:%M')"
          git push
