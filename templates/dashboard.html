<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AиӮЎйҮҸеҢ–зӣ‘жҺ§</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; color: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px; }
        .header h1 { font-size: 22px; background: linear-gradient(90deg, #1a73e8, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #d9d9d9; background: #fff; cursor: pointer; font-size: 13px; transition: all .2s; white-space: nowrap; }
        .btn:hover { border-color: #1a73e8; color: #1a73e8; }
        .btn-primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
        .btn-primary:hover { background: #1557b0; color: #fff; }
        .stat-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 160px; background: #fff; border-radius: 12px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .stat-card .label { color: #888; font-size: 13px; }
        .stat-card .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
        .stat-card .sub { font-size: 13px; color: #888; margin-top: 4px; }
        .up { color: #e74c3c; } .down { color: #27ae60; }
        .section-title { font-size: 16px; font-weight: 600; margin: 20px 0 12px; color: #333; display: flex; align-items: center; gap: 8px; }
        .stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .stock-card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.06); cursor: pointer; transition: all .2s; position: relative; }
        .stock-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); transform: translateY(-2px); }
        .stock-card .top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
        .stock-card .name { font-size: 16px; font-weight: 600; }
        .stock-card .code { font-size: 12px; color: #999; }
        .stock-card .sector { font-size: 11px; background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 4px; margin-left: 6px; }
        .stock-card .remove-btn { position: absolute; top: 8px; right: 12px; width: 24px; height: 24px; border-radius: 50%; border: none; background: transparent; color: #ccc; cursor: pointer; font-size: 16px; line-height: 24px; text-align: center; }
        .stock-card .remove-btn:hover { color: #e74c3c; background: #fce4e4; }
        .stock-card .price { font-size: 30px; font-weight: 700; margin-bottom: 6px; }
        .stock-card .meta { display: flex; gap: 10px; font-size: 13px; color: #666; flex-wrap: wrap; align-items: center; }
        .score-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
        .score-high { background: #d4edda; color: #155724; }
        .score-mid { background: #fff3cd; color: #856404; }
        .score-low { background: #f8d7da; color: #721c24; }
        .signal-tags { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
        .signal-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #f5f5f5; color: #666; border: 1px solid #e8e8e8; }
        .signal-tag.warn { background: #fff3cd; color: #856404; border-color: #ffc107; }
        .signal-tag.danger { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .signal-tag.info { background: #e8f0fe; color: #1a73e8; border-color: #aec3e8; }
        .table-wrap { width: 100%; overflow-x: auto; margin-bottom: 16px; }
        .table-wrap table { width: 100%; min-width: 600px; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 13px; white-space: nowrap; }
        th { background: #fafafa; color: #666; font-weight: 600; font-size: 12px; }
        tr:hover td { background: #fafafa; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.4); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 16px; padding: 24px; width: 420px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
        .modal h3 { font-size: 18px; margin-bottom: 16px; }
        .modal input { width: 100%; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; outline: none; }
        .modal input:focus { border-color: #1a73e8; }
        .modal .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .empty-tip { color: #999; padding: 20px; text-align: center; background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        .badge-buy { background: #fce4e4; color: #c62828; }
        .badge-sell { background: #e8f5e9; color: #2e7d32; }
        .badge-add { background: #fff3e0; color: #e65100; }
        .summary-box { background: #fff; border-radius: 12px; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px; display: flex; gap: 24px; flex-wrap: wrap; font-size: 13px; }
        .summary-item { display: flex; gap: 8px; align-items: center; }
        .summary-item .label { color: #888; }
        .summary-item .val { font-weight: 600; }
        @media (max-width: 640px) {
            .container { padding: 12px; }
            .stat-card { min-width: 140px; padding: 14px 16px; }
            .stat-card .value { font-size: 20px; }
            .stock-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 10px; }
            .header-actions { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>рҹ“Ҳ AиӮЎйҮҸеҢ–зӣ‘жҺ§</h1>
        <div class="header-actions">
            <span id="updateTime" style="font-size:12px;color:#999">--</span>
            <button class="btn" onclick="refreshAll()">рҹ”„ еҲ·ж–°</button>
            <button class="btn btn-primary" onclick="showAddModal()">пјӢ ж·»еҠ иӮЎзҘЁ</button>
        </div>
    </div>

    <div class="stat-row" id="stats"></div>

    <div class="section-title">рҹ“Ҡ зӣ‘жҺ§иӮЎзҘЁ (<span id="stockCount">0</span>)</div>
    <div id="stockGrid" class="stock-grid"></div>

    <div id="summarySection"></div>
    <div id="tradeSection"></div>
    <div id="positionSection"></div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h3>ж·»еҠ зӣ‘жҺ§иӮЎзҘЁ</h3>
        <input type="text" id="addCodeInput" placeholder="иҫ“е…ҘиӮЎзҘЁд»Јз ҒпјҲеҰӮ600888пјү" onkeydown="if(event.key==='Enter')addStock()">
        <div class="modal-btns">
            <button class="btn" onclick="closeModal()">еҸ–ж¶Ҳ</button>
            <button class="btn btn-primary" onclick="addStock()">ж·»еҠ </button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="detailModal">
    <div class="modal" style="width:450px" id="detailContent"></div>
</div>

<script>
var data = { stocks: [], acct: {} };
function fmt(v) { if (v==null) return '0'; return v >= 10000 ? (v/10000).toFixed(1)+'дёҮ' : v.toFixed(0); }
function fmtMoney(v) { if (v==null) return '0'; var absv = Math.abs(v); return (absv >= 10000 ? (absv/10000).toFixed(1)+'дёҮ' : absv.toFixed(0)); }
function safe(v, def) { return v != null ? v : (def || 0); }
function esc(s) { return String(s||'').replace(/['"]/g,'').replace(/[<>]/g,''); }

async function fetchData() {
  try {
    var [st, ac] = await Promise.all([
      fetch('/api/stocks').then(function(r){ return r.json(); }),
      fetch('/api/account').then(function(r){ return r.json(); })
    ]);
    data.stocks = st||[]; data.acct = ac||{};
    document.getElementById('updateTime').innerText = new Date().toLocaleTimeString();
    render();
  } catch(e) { console.error(e); }
}

function render() {
  var ac = data.acct;
  var pnl = safe(ac.total_return);
  var todayPnl = safe(ac.today_profit);
  var pnlCls = pnl >= 0 ? 'up' : 'down';
  var todayCls = todayPnl >= 0 ? 'up' : 'down';
  var todayStr = (todayPnl >= 0 ? 'д»Ҡж—Ҙ +' : 'д»Ҡж—Ҙ ') + fmtMoney(todayPnl) + 'е…ғ';

  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="label">жҖ»иө„дә§</div><div class="value">'+fmt(ac.total_value)+'</div><div class="sub">жң¬йҮ‘ 50дёҮ</div></div>' +
    '<div class="stat-card"><div class="label">жҖ»ж”¶зӣҠ</div><div class="value '+pnlCls+'">'+(pnl>=0?'+':'')+pnl+'%</div><div class="sub '+todayCls+'">'+todayStr+'</div></div>' +
    '<div class="stat-card"><div class="label">жҢҒд»“еёӮеҖј</div><div class="value">'+fmt(safe(ac.total_value)-safe(ac.cash))+'</div><div class="sub">зҺ°йҮ‘ '+fmt(ac.cash)+'</div></div>' +
    '<div class="stat-card"><div class="label">иғңзҺҮ/дәӨжҳ“</div><div class="value">'+(ac.win_rate||0)+'%</div><div class="sub">'+(ac.trade_count||0)+'з¬”дәӨжҳ“</div></div>';

  document.getElementById('stockCount').innerText = data.stocks.length;

  var grid = '';
  if (!data.stocks.length) {
    grid = '<div class="empty-tip">жҡӮж— зӣ‘жҺ§иӮЎзҘЁ</div>';
  } else {
    for (var i = 0; i < data.stocks.length; i++) {
      var s = data.stocks[i];
      var chg = safe(s.chg);
      var score = safe(s.score);
      var scoreCls = score >= 60 ? 'score-high' : score >= 40 ? 'score-mid' : 'score-low';
      var sigHtml = '';
      var sigs = s.signals || [];
      for (var j = 0; j < sigs.length; j++) {
        var sig = sigs[j];
        var stype = sig.type || '';
        var cls = stype.indexOf('bear') >= 0 ? 'danger' : stype.indexOf('over') >= 0 ? 'warn' : 'info';
        sigHtml += '<span class="signal-tag ' + cls + '">' + esc(sig.label||sig.suggestion||stype) + '</span>';
      }
      var sector = s.sector || '';
      var name = esc(s.name||'');
      var code = esc(s.code||'');
      var trend = esc(s.trend||'--');
      grid += '<div class="stock-card" onclick="showDetail(\''+code+'\',\''+name+'\',\''+esc(sector)+'\','+safe(s.price)+','+chg+','+score+',\''+trend+'\',\''+esc(s.volume||'')+'\')">' +
        '<button class="remove-btn" onclick="event.stopPropagation();removeStock(\''+code+'\')">Г—</button>' +
        '<div class="top"><div><span class="name">'+name+'</span><span class="code"> '+code+'</span>'+(sector?'<span class="sector">'+sector+'</span>':'')+'</div></div>' +
        '<div class="price '+(chg>=0?'up':'down')+'">'+(safe(s.price)).toFixed(2)+'</div>' +
        '<div class="meta"><span class="'+(chg>=0?'up':'down')+'">'+(chg>=0?'+':'')+chg.toFixed(2)+'%</span><span>'+trend+'</span><span class="score-badge '+scoreCls+'">иҜ„еҲҶ'+score+'</span>'+(sigs.length?'<span>дҝЎеҸ·'+sigs.length+'дёӘ</span>':'')+'</div>' +
        (sigHtml ? '<div class="signal-tags">'+sigHtml+'</div>' : '') +
        '</div>';
    }
  }
  document.getElementById('stockGrid').innerHTML = grid;

  // в”Җв”Җ дәӨжҳ“/ж”¶зӣҠжҖ»и§Ҳ в”Җв”Җ
  var summary = '<div class="summary-box">' +
    '<span class="summary-item"><span class="label">рҹ“Ҳ жҖ»ж”¶зӣҠ</span><span class="val '+(pnl>=0?'up':'down')+'">'+(pnl>=0?'+':'')+pnl+'% ('+fmtMoney(pnl/100*500000)+'е…ғ)</span></span>' +
    '<span class="summary-item"><span class="label">рҹ“Ҡ жҖ»дәӨжҳ“</span><span class="val">'+(ac.trade_count||0)+'з¬”</span></span>' +
    '<span class="summary-item"><span class="label">рҹҺҜ иғңзҺҮ</span><span class="val">'+(ac.win_rate||0)+'% ('+(ac.win_count||0)+'иғң/'+(ac.trade_count-(ac.win_count||0)||0)+'иҙҹ)</span></span>' +
    '<span class="summary-item"><span class="label">рҹ’° д»Ҡж—ҘзӣҲдәҸ</span><span class="val '+(todayPnl>=0?'up':'down')+'">'+(todayPnl>=0?'+':'')+fmtMoney(todayPnl)+'е…ғ</span></span>' +
    '<span class="summary-item"><span class="label">рҹ“Ұ жҢҒд»“</span><span class="val">'+(ac.positions||[]).length+'еҸӘ</span></span>' +
    '</div>';

  // в”Җв”Җ д»Ҡж—ҘдәӨжҳ“ в”Җв”Җ
  var trades = ac.today_trades || [];
  var tradeHtml = '';
  if (trades.length) {
    tradeHtml = '<div class="section-title">рҹ“Ӣ д»Ҡж—ҘдәӨжҳ“ ('+trades.length+'з¬”)</div><div class="table-wrap"><table><tr><th>зұ»еһӢ</th><th>иӮЎзҘЁ</th><th>д»Јз Ғ</th><th>д»·ж ј</th><th>ж•°йҮҸ</th><th>йҮ‘йўқ</th><th>зӣҲдәҸ</th><th>еҺҹеӣ </th></tr>';
    for (var ti = 0; ti < trades.length; ti++) {
      var t = trades[ti];
      var act = t.action||'';
      var isBuy = act.indexOf('д№°е…Ҙ')>=0 || act==='еҠ д»“';
      var cls = isBuy ? 'up' : 'down';
      var badgeCls = act==='еҠ д»“' ? 'badge-add' : isBuy ? 'badge-buy' : 'badge-sell';
      var priceStr = t.price ? t.price.toFixed(2) : '--';
      var sharesStr = t.shares ? t.shares : '--';
      var amountStr = (t.price && t.shares) ? fmtMoney(t.price*t.shares) : '--';
      var profitStr = '--';
      if (t.profit_pct != null) {
        profitStr = (t.profit_pct >= 0 ? '+' : '') + t.profit_pct.toFixed(2) + '%';
      } else if (t.profit_amount != null) {
        profitStr = (t.profit_amount >= 0 ? '+' : '') + fmtMoney(t.profit_amount) + 'е…ғ';
      }
      tradeHtml += '<tr>' +
        '<td><span class="badge '+badgeCls+'">'+esc(act)+'</span></td>' +
        '<td>'+esc(t.name||'')+'</td>' +
        '<td>'+esc(t.code||'')+'</td>' +
        '<td>'+priceStr+'</td>' +
        '<td>'+sharesStr+'</td>' +
        '<td>'+amountStr+'</td>' +
        '<td class="'+(t.profit_pct>=0?'up':'down')+'">'+profitStr+'</td>' +
        '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.reason||'')+'</td>' +
        '</tr>';
    }
    tradeHtml += '</table></div>';
  }

  // жІЎжңүд»Ҡж—ҘдәӨжҳ“ж—¶д№ҹжҳҫзӨәжҖ»и§Ҳ
  if (!trades.length && (ac.trade_count||0) > 0) {
    // жҳҫзӨәеҺҶеҸІжңҖиҝ‘дәӨжҳ“
  }

  document.getElementById('summarySection').innerHTML = summary;
  document.getElementById('tradeSection').innerHTML = tradeHtml;

  // в”Җв”Җ жҢҒд»“жҳҺз»Ҷ в”Җв”Җ
  var pos = ac.positions || [];
  var posHtml = '';
  if (pos.length) {
    posHtml = '<div class="section-title">рҹ“Ұ жҢҒд»“жҳҺз»Ҷ</div><div class="table-wrap"><table><tr><th>иӮЎзҘЁ</th><th>д»Јз Ғ</th><th>иӮЎж•°</th><th>еқҮд»·</th><th>зҺ°д»·</th><th>зӣҲдәҸ</th><th>зӣҲдәҸ%</th><th>еёӮеҖј</th><th>д»Ҡж—ҘзӣҲдәҸ</th><th>еҠ д»“</th></tr>';
    for (var pi = 0; pi < pos.length; pi++) {
      var p = pos[pi];
      var bp = safe(p.buy_price);
      var cp = safe(p.current_price);
      var profit = cp && bp ? ((cp/bp-1)*100) : 0;
      var profitAmt = p.profit_amount || 0;
      var todayProfit = p.today_profit || 0;
      posHtml += '<tr>' +
        '<td>'+esc(p.name||'')+'</td>' +
        '<td>'+esc(p.code||'')+'</td>' +
        '<td>'+safe(p.shares,0)+'</td>' +
        '<td>'+bp.toFixed(2)+'</td>' +
        '<td>'+cp.toFixed(2)+'</td>' +
        '<td class="'+(profitAmt>=0?'up':'down')+'">'+(profitAmt>=0?'+':'')+fmtMoney(profitAmt)+'</td>' +
        '<td class="'+(profit>=0?'up':'down')+'">'+(profit>=0?'+':'')+profit.toFixed(2)+'%</td>' +
        '<td>'+fmt(safe(p.shares,0)*cp)+'</td>' +
        '<td class="'+(todayProfit>=0?'up':'down')+'">'+(todayProfit>=0?'+':'')+fmtMoney(todayProfit)+'</td>' +
        '<td>'+safe(p.add_count,0)+'</td>' +
        '</tr>';
    }
    posHtml += '</table></div>';
  }
  document.getElementById('positionSection').innerHTML = posHtml;
}

function showAddModal() { document.getElementById('addModal').classList.add('show'); document.getElementById('addCodeInput').focus(); }
function closeModal() { document.getElementById('addModal').classList.remove('show'); document.getElementById('detailModal').classList.remove('show'); }

async function addStock() {
  var code = document.getElementById('addCodeInput').value.trim();
  if (!code) return;
  var r = await fetch('/api/add_stock', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code,name:''})});
  alert(await r.text());
  document.getElementById('addCodeInput').value = '';
  closeModal();
  fetchData();
}

async function removeStock(code) {
  if (!confirm('зЎ®е®ҡз§»йҷӨ '+code+'?')) return;
  var r = await fetch('/api/remove_stock', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code})});
  alert(await r.text());
  fetchData();
}

function showDetail(code, name, sector, price, chg, score, trend, volume) {
  var html =
    '<h3>'+name+' ('+code+')</h3>' +
    '<table style="width:100%">' +
    '<tr><td style="color:#999">д»·ж ј</td><td style="font-weight:700">'+safe(price).toFixed(2)+'</td></tr>' +
    '<tr><td style="color:#999">ж¶Ёи·Ңе№…</td><td class="'+(chg>=0?'up':'down')+'">'+(chg>=0?'+':'')+chg.toFixed(2)+'%</td></tr>' +
    '<tr><td style="color:#999">и¶ӢеҠҝ</td><td>'+esc(trend)+'</td></tr>' +
    '<tr><td style="color:#999">иҜ„еҲҶ</td><td>'+score+'</td></tr>' +
    '<tr><td style="color:#999">жқҝеқ—</td><td>'+esc(sector)+'</td></tr>' +
    '<tr><td style="color:#999">жҲҗдәӨйҮҸ</td><td>'+esc(volume)+'</td></tr>' +
    '</table>' +
    '<div class="modal-btns"><button class="btn" onclick="closeModal()">е…ій—ӯ</button></div>';
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('show');
}

function refreshAll() { fetchData(); }

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
