<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股量化监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; color: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .header h1 { font-size: 22px; background: linear-gradient(90deg, #1a73e8, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #d9d9d9; background: #fff; cursor: pointer; font-size: 13px; transition: all .2s; white-space: nowrap; }
        .btn:hover { border-color: #1a73e8; color: #1a73e8; }
        .btn-primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
        .btn-primary:hover { background: #1557b0; }
        .stat-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 160px; background: #fff; border-radius: 12px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .stat-card .label { color: #888; font-size: 13px; }
        .stat-card .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
        .stat-card .sub { font-size: 13px; color: #888; margin-top: 4px; }
        .up { color: #e74c3c; } .down { color: #27ae60; }
        .section-title { font-size: 16px; font-weight: 600; margin: 20px 0 12px; color: #333; display: flex; align-items: center; gap: 8px; }
        .stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .stock-card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.06); cursor: pointer; transition: all .2s; position: relative; }
        .stock-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); transform: translateY(-2px); }
        .stock-card .top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
        .stock-card .name { font-size: 16px; font-weight: 600; }
        .stock-card .code { font-size: 12px; color: #999; }
        .stock-card .sector { font-size: 11px; background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 4px; margin-left: 6px; }
        .stock-card .remove-btn { position: absolute; top: 8px; right: 12px; width: 24px; height: 24px; border-radius: 50%; border: none; background: transparent; color: #ccc; cursor: pointer; font-size: 16px; line-height: 24px; text-align: center; }
        .stock-card .remove-btn:hover { color: #e74c3c; background: #fce4e4; }
        .stock-card .price { font-size: 30px; font-weight: 700; margin-bottom: 6px; }
        .stock-card .meta { display: flex; gap: 10px; font-size: 13px; color: #666; flex-wrap: wrap; align-items: center; }
        .score-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
        .score-high { background: #d4edda; color: #155724; }
        .score-mid { background: #fff3cd; color: #856404; }
        .score-low { background: #f8d7da; color: #721c24; }
        .signal-tags { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
        .signal-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #f5f5f5; color: #666; border: 1px solid #e8e8e8; }
        .signal-tag.warn { background: #fff3cd; color: #856404; border-color: #ffc107; }
        .signal-tag.danger { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .table-wrap { width: 100%; overflow-x: auto; margin-bottom: 16px; }
        .table-wrap table { width: 100%; min-width: 650px; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 13px; white-space: nowrap; }
        th { background: #fafafa; color: #666; font-weight: 600; font-size: 12px; }
        tr:hover td { background: #fafafa; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.4); z-index: 999; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 16px; padding: 24px; width: 420px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
        .modal h3 { font-size: 18px; margin-bottom: 16px; }
        .modal input { width: 100%; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; outline: none; }
        .modal input:focus { border-color: #1a73e8; }
        .modal .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .empty-tip { color: #999; padding: 20px; text-align: center; background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        .badge-buy { background: #fce4e4; color: #c62828; }
        .badge-sell { background: #e8f5e9; color: #2e7d32; }
        .badge-add { background: #fff3e0; color: #e65100; }
        .summary-box { background: #fff; border-radius: 12px; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .summary-item { display: flex; flex-direction: column; gap: 2px; }
        .summary-item .label { color: #888; font-size: 12px; }
        .summary-item .val { font-size: 16px; font-weight: 600; }
        .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .mt-2 { margin-top: 8px; }
        @media (max-width: 640px) {
            .container { padding: 12px; }
            .stat-card { min-width: 140px; padding: 14px 16px; }
            .stat-card .value { font-size: 20px; }
            .stock-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: start; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📈 A股量化监控</h1>
        <div class="header-actions">
            <span id="updateTime" style="font-size:12px;color:#999">--</span>
            <button class="btn" onclick="refreshAll()">🔄 刷新</button>
            <button class="btn btn-primary" onclick="showAddModal()">＋ 添加股票</button>
        </div>
    </div>

    <div class="stat-row" id="stats"></div>

    <div class="section-title">📊 监控股票 (<span id="stockCount">0</span>)</div>
    <div id="stockGrid" class="stock-grid"></div>

    <div id="summarySection"></div>
    <div id="tradeSection"></div>
    <div id="positionSection"></div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h3>添加监控股票</h3>
        <input type="text" id="addCodeInput" placeholder="输入股票代码（如600888）" onkeydown="if(event.key==='Enter')addStock()">
        <div class="modal-btns">
            <button class="btn" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="addStock()">添加</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="detailModal">
    <div class="modal" style="width:450px" id="detailContent"></div>
</div>

<script>
var INIT_CASH = 500000;
var data = { stocks: [], acct: {} };
function fmt(v) { if (v==null) return '0'; return v >= 10000 ? (v/10000).toFixed(2)+'万' : v.toFixed(2); }
function fmtDollar(v) { if (v==null) return '0'; var a=Math.abs(v); var s = a >= 10000 ? (a/10000).toFixed(2)+'万' : a.toFixed(2); return v >= 0 ? s : '-'+s; }
function safe(v, d) { return v != null ? v : (d||0); }
function esc(s) { return String(s||'').replace(/['"]/g,'').replace(/[<>]/g,''); }

async function fetchData() {
  try {
    var [st, ac] = await Promise.all([
      fetch('/api/stocks').then(function(r){ return r.json(); }),
      fetch('/api/account').then(function(r){ return r.json(); })
    ]);
    data.stocks = st||[]; data.acct = ac||{};
    document.getElementById('updateTime').innerText = new Date().toLocaleTimeString() + ' 更新';
    render();
  } catch(e) { console.error(e); }
}

function render() {
  var ac = data.acct;
  var tv = safe(ac.total_value);
  var cash = safe(ac.cash);
  var sv = tv - cash;
  var pnl = safe(ac.total_return);
  var todayPnl = safe(ac.today_profit);
  var pnlAmt = tv - INIT_CASH;
  var pnlCls = pnl >= 0 ? 'up' : 'down';

  // ── 顶部统计卡片 ──
  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="label">总资产</div><div class="value">'+fmt(tv)+'</div><div class="sub">现金 '+fmt(cash)+' + 持仓 '+fmt(sv)+'</div></div>' +
    '<div class="stat-card"><div class="label">总盈亏</div><div class="value '+pnlCls+'">'+(pnlAmt>=0?'+':'')+fmtDollar(pnlAmt)+'元</div><div class="sub '+(pnl>=0?'up':'down')+'">'+(pnl>=0?'+':'')+pnl.toFixed(2)+'% (本金50万)</div></div>' +
    '<div class="stat-card"><div class="label">今日收益</div><div class="value '+(todayPnl>=0?'up':'down')+'">'+(todayPnl>=0?'+':'')+fmtDollar(todayPnl)+'元</div><div class="sub">'+(tv>0?((todayPnl/tv*100).toFixed(2)):'0.00')+'%</div></div>' +
    '<div class="stat-card"><div class="label">胜率/交易</div><div class="value">'+(ac.win_rate||0)+'%</div><div class="sub">'+(ac.trade_count||0)+'笔 ('+(ac.win_count||0)+'胜/'+(ac.trade_count-(ac.win_count||0)||0)+'负)</div></div>';

  document.getElementById('stockCount').innerText = data.stocks.length;

  // ── 股票卡片 ──
  var grid = '';
  if (!data.stocks.length) {
    grid = '<div class="empty-tip">暂无监控股票</div>';
  } else {
    for (var i = 0; i < data.stocks.length; i++) {
      var s = data.stocks[i];
      var changePct = safe(s.change_pct);
      var price = safe(s.price);
      var score = safe(s.score);
      var scoreCls = score >= 60 ? 'score-high' : score >= 40 ? 'score-mid' : 'score-low';
      var sigHtml = '';
      var sigs = s.signals || [];
      for (var j = 0; j < sigs.length; j++) {
        var sig = sigs[j];
        var stype = sig.type || '';
        var cls = stype.indexOf('bear')>=0 ? 'danger' : stype.indexOf('over')>=0 ? 'warn' : 'info';
        sigHtml += '<span class="signal-tag '+cls+'">'+esc(sig.label||sig.suggestion||stype)+'</span>';
      }
      var sector = s.sector || '';
      var name = esc(s.name||'');
      var code = esc(s.code||'');
      var trend = esc(s.trend||'--');
      grid += 
        '<div class="stock-card" onclick="showDetail(\''+code+'\',\''+name+'\',\''+esc(sector)+'\','+price+','+changePct+','+score+',\''+trend+'\',\''+esc(s.volume||'')+'\')">' +
        '<button class="remove-btn" onclick="event.stopPropagation();removeStock(\''+code+'\')">×</button>' +
        '<div class="top"><div><span class="name">'+name+'</span><span class="code"> '+code+'</span>'+(sector?'<span class="sector">'+sector+'</span>':'')+'</div></div>' +
        '<div class="price '+(changePct>=0?'up':'down')+'">'+price.toFixed(2)+'</div>' +
        '<div class="meta"><span class="'+(changePct>=0?'up':'down')+'">'+(changePct>=0?'+':'')+changePct.toFixed(2)+'%</span><span>'+trend+'</span><span class="score-badge '+scoreCls+'">评分'+score+'</span>'+(sigs.length?'<span>信号'+sigs.length+'个</span>':'')+'</div>' +
        (sigHtml ? '<div class="signal-tags">'+sigHtml+'</div>' : '') +
        '</div>';
    }
  }
  document.getElementById('stockGrid').innerHTML = grid;

  // ── 收益总览 ──
  var summary = '<div class="section-title">📈 收益总览</div><div class="summary-box"><div class="summary-grid">' +
    '<div class="summary-item"><span class="label">总盈亏（金额）</span><span class="val '+(pnlAmt>=0?'up':'down')+'">'+(pnlAmt>=0?'+':'')+fmtDollar(pnlAmt)+'元</span></div>' +
    '<div class="summary-item"><span class="label">总盈亏（百分比）</span><span class="val '+(pnl>=0?'up':'down')+'">'+(pnl>=0?'+':'')+pnl.toFixed(2)+'%</span></div>' +
    '<div class="summary-item"><span class="label">本金</span><span class="val">'+fmt(INIT_CASH)+'元</span></div>' +
    '<div class="summary-item"><span class="label">总资产</span><span class="val">'+fmt(tv)+'元</span></div>' +
    '<div class="summary-item"><span class="label">可用现金</span><span class="val">'+fmt(cash)+'元</span></div>' +
    '<div class="summary-item"><span class="label">持仓市值</span><span class="val">'+fmt(sv)+'元</span></div>' +
    '<div class="summary-item"><span class="label">总交易笔数</span><span class="val">'+(ac.trade_count||0)+'笔</span></div>' +
    '<div class="summary-item"><span class="label">胜率</span><span class="val">'+(ac.win_rate||0)+'% ('+(ac.win_count||0)+'胜'+(ac.trade_count-(ac.win_count||0)||0)+'负)</span></div>' +
    '<div class="summary-item"><span class="label">今日收益</span><span class="val '+(todayPnl>=0?'up':'down')+'">'+(todayPnl>=0?'+':'')+fmtDollar(todayPnl)+'元</span></div>' +
    '</div></div>';

  document.getElementById('summarySection').innerHTML = summary;

  // ── 今日交易（始终显示区域） ──
  var trades = ac.today_trades || [];
  var tradeHtml = '<div class="section-title">📋 今日交易 ('+trades.length+'笔)</div>';
  if (trades.length) {
    tradeHtml += '<div class="table-wrap"><table><tr><th>类型</th><th>股票</th><th>代码</th><th>价格</th><th>数量</th><th>金额</th><th>盈亏(金额)</th><th>盈亏%</th><th>原因</th></tr>';
    for (var ti = 0; ti < trades.length; ti++) {
      var t = trades[ti];
      var act = t.action||'';
      var isBuy = act.indexOf('买入')>=0 || act==='加仓';
      var badgeCls = act==='加仓' ? 'badge-add' : isBuy ? 'badge-buy' : 'badge-sell';
      var amt = (t.price||0)*(t.shares||0);
      var profitAmtStr = t.profit_amount != null ? ((t.profit_amount>=0?'+':'')+fmtDollar(t.profit_amount)+'元') : '--';
      var profitPctStr = t.profit_pct != null ? ((t.profit_pct>=0?'+':'')+t.profit_pct.toFixed(2)+'%') : '--';
      tradeHtml += '<tr>'+
        '<td><span class="badge '+badgeCls+'">'+esc(act)+'</span></td>'+
        '<td>'+esc(t.name||'')+'</td>'+
        '<td>'+esc(t.code||'')+'</td>'+
        '<td>'+(t.price?t.price.toFixed(2):'--')+'</td>'+
        '<td>'+(t.shares||0)+'</td>'+
        '<td>'+fmtDollar(amt)+'元</td>'+
        '<td class="'+(t.profit_amount>=0?'up':'down')+'">'+profitAmtStr+'</td>'+
        '<td class="'+(t.profit_pct>=0?'up':'down')+'">'+profitPctStr+'</td>'+
        '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.reason||'')+'</td>'+
        '</tr>';
    }
    tradeHtml += '</table></div>';
  } else {
    tradeHtml += '<div class="empty-tip">今日暂无交易</div>';
  }
  document.getElementById('tradeSection').innerHTML = tradeHtml;

  // ── 持仓明细 ──
  var pos = ac.positions || [];
  var posHtml = '';
  if (pos.length) {
    posHtml = '<div class="section-title">📦 持仓明细 ('+pos.length+'只)</div><div class="table-wrap"><table><tr><th>股票</th><th>代码</th><th>股数</th><th>均价</th><th>现价</th><th>总盈亏</th><th>盈亏%</th><th>市值</th><th>今日盈亏</th><th>加仓</th></tr>';
    for (var pi = 0; pi < pos.length; pi++) {
      var p = pos[pi];
      var bp = safe(p.buy_price);
      var cp = safe(p.current_price);
      var shares = safe(p.shares,0);
      var profitPct = cp && bp ? ((cp/bp-1)*100) : 0;
      var profitAmt = p.profit_amount || (shares*cp - shares*bp);
      var todayP = p.today_profit || 0;
      posHtml += '<tr>'+
        '<td>'+esc(p.name||'')+'</td>'+
        '<td>'+esc(p.code||'')+'</td>'+
        '<td>'+shares+'</td>'+
        '<td>'+bp.toFixed(2)+'</td>'+
        '<td>'+cp.toFixed(2)+'</td>'+
        '<td class="'+(profitAmt>=0?'up':'down')+'">'+(profitAmt>=0?'+':'')+fmtDollar(profitAmt)+'元</td>'+
        '<td class="'+(profitPct>=0?'up':'down')+'">'+(profitPct>=0?'+':'')+profitPct.toFixed(2)+'%</td>'+
        '<td>'+fmt(shares*cp)+'</td>'+
        '<td class="'+(todayP>=0?'up':'down')+'">'+(todayP>=0?'+':'')+fmtDollar(todayP)+'元</td>'+
        '<td>'+safe(p.add_count,0)+'</td>'+
        '</tr>';
    }
    posHtml += '</table></div>';
  }
  document.getElementById('positionSection').innerHTML = posHtml;
}

function showAddModal() { document.getElementById('addModal').classList.add('show'); document.getElementById('addCodeInput').focus(); }
function closeModal() { document.getElementById('addModal').classList.remove('show'); document.getElementById('detailModal').classList.remove('show'); }

async function addStock() {
  var code = document.getElementById('addCodeInput').value.trim();
  if (!code) return;
  var r = await fetch('/api/add_stock', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code,name:''})});
  alert(await r.text());
  document.getElementById('addCodeInput').value = '';
  closeModal();
  fetchData();
}

async function removeStock(code) {
  if (!confirm('确定移除 '+code+'?')) return;
  var r = await fetch('/api/remove_stock', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code})});
  alert(await r.text());
  fetchData();
}

function showDetail(code, name, sector, price, chg, score, trend, volume) {
  var html =
    '<h3>'+name+' ('+code+')</h3>' +
    '<table style="width:100%;margin-top:12px">' +
    '<tr><td style="color:#999;padding:8px 0">价格</td><td style="font-weight:700;padding:8px 0">'+safe(price).toFixed(2)+'</td></tr>' +
    '<tr><td style="color:#999;padding:8px 0">涨跌幅</td><td class="'+(chg>=0?'up':'down')+'" style="padding:8px 0">'+(chg>=0?'+':'')+chg.toFixed(2)+'%</td></tr>' +
    '<tr><td style="color:#999;padding:8px 0">趋势</td><td style="padding:8px 0">'+esc(trend)+'</td></tr>' +
    '<tr><td style="color:#999;padding:8px 0">评分</td><td style="padding:8px 0">'+score+'</td></tr>' +
    '<tr><td style="color:#999;padding:8px 0">板块</td><td style="padding:8px 0">'+esc(sector)+'</td></tr>' +
    '<tr><td style="color:#999;padding:8px 0">成交量</td><td style="padding:8px 0">'+esc(volume)+'</td></tr>' +
    '</table>' +
    '<div class="modal-btns"><button class="btn" onclick="closeModal()">关闭</button></div>';
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('show');
}

function refreshAll() { fetchData(); }

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
